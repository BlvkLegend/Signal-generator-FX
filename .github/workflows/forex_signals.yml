name: Forex Signals

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run_signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests tvDatafeed
      
      - name: Run signal generator
        run: python -u signal_generator.py
        continue-on-error: true
      
      - name: Show logs
        if: always()
        run: echo "Job completed with status ${{ job.status }}"
